name: Build combined.sieve

on:
  push:
    branches: [main]
    paths:
      - 'filters/*.sieve'
      - 'build.sh'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build combined.sieve
        run: chmod +x build.sh && ./build.sh

      - name: Commit updated combined.sieve
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add combined.sieve
          git diff --cached --quiet || git commit -m "chore: rebuild combined.sieve"
          git push
